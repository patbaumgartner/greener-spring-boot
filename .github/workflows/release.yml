name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0). Leave empty for snapshot deploy."
        required: false
        type: string

env:
  JAVA_VERSION: "25"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      JRELEASER_MAVENCENTRAL_SONATYPE_TOKEN: ${{ secrets.SONATYPE_PASSWORD }}
      JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
      JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Java ───────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 3. Set release version (if provided) ─────────────────────────────────
      - name: Set release version
        if: inputs.version != ''
        run: mvn -B versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      # ── 4. Build & stage Maven artifacts ──────────────────────────────────────
      - name: Stage Maven artifacts
        run: mvn -B -Ppublication

      # ── 5. Stage Gradle plugin artifacts ─────────────────────────────────────
      - name: Stage Gradle plugin artifacts
        working-directory: greener-spring-boot-gradle-plugin
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            sed -i "s/0.1.0-SNAPSHOT/${{ inputs.version }}/g" build.gradle.kts
          fi
          ./gradlew publishAllPublicationsToStagingRepository

      # ── 6. Deploy snapshot to Maven Central ──────────────────────────────────
      - name: Deploy snapshot
        if: inputs.version == ''
        run: mvn -B jreleaser:deploy -N

      # ── 7. Release to Maven Central + GitHub Release ─────────────────────────
      - name: Release
        if: inputs.version != ''
        run: mvn -B jreleaser:full-release -N

      # ── 8. Publish Gradle plugin to Gradle Plugin Portal (releases only) ─────
      - name: Publish Gradle Plugin
        if: inputs.version != ''
        working-directory: greener-spring-boot-gradle-plugin
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins

      # ── 9. Persist JReleaser logs ────────────────────────────────────────────
      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-release
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties
