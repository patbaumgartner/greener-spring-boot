name: Release

# Deploys artifacts to Maven Central and the Gradle Plugin Portal.
#
# ── Modes ─────────────────────────────────────────────────────────────────────
#   - Snapshot: leave the "version" input empty to deploy the current -SNAPSHOT.
#   - Release:  provide a version (e.g. "0.2.0") to set the version, stage
#               artifacts locally, and let JReleaser publish them.
#
# ── Trigger ───────────────────────────────────────────────────────────────────
# Manual dispatch only (workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0). Leave empty for snapshot deploy."
        required: false
        type: string

env:
  JAVA_VERSION: "17"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    env:
      JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      JRELEASER_MAVENCENTRAL_SONATYPE_TOKEN: ${{ secrets.SONATYPE_PASSWORD }}
      JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
      JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # ── 2. Set up Java ──────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: central-snapshots
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      # ── 3. Set release version (if provided) ────────────────────────────────
      - name: Set release version
        if: inputs.version != ''
        run: |
          mvn --batch-mode --no-transfer-progress versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false
          sed -i "s/^version=.*/version=${{ inputs.version }}/" greener-spring-boot-gradle-plugin/gradle.properties
          sed -i "s/^coreVersion=.*/coreVersion=${{ inputs.version }}/" greener-spring-boot-gradle-plugin/gradle.properties

      # ── 4. Snapshot deploy (direct to Central Portal snapshot repo) ─────────
      - name: Deploy Maven snapshot
        if: inputs.version == ''
        env:
          CENTRAL_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: mvn --batch-mode --no-transfer-progress -Ppublication

      - name: Deploy Gradle snapshot
        if: inputs.version == ''
        working-directory: greener-spring-boot-gradle-plugin
        env:
          CENTRAL_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: ./gradlew publishAllPublicationsToCentralSnapshotsRepository

      # ── 5. Release (stage locally, then JReleaser bundles + uploads) ────────
      - name: Stage Maven artifacts
        if: inputs.version != ''
        run: mvn --batch-mode --no-transfer-progress -Ppublication -DaltDeploymentRepository=local::file:./target/staging-deploy

      - name: Stage Gradle plugin artifacts
        if: inputs.version != ''
        working-directory: greener-spring-boot-gradle-plugin
        run: |
          ./gradlew publishAllPublicationsToStagingRepository

      - name: Release
        if: inputs.version != ''
        run: mvn --batch-mode --no-transfer-progress jreleaser:full-release -N -Djreleaser.config.file=jreleaser.yml

      - name: Publish Gradle Plugin
        if: inputs.version != ''
        working-directory: greener-spring-boot-gradle-plugin
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          ./gradlew publishPlugins

      # ── 6. Bump to next snapshot version ────────────────────────────────────
      - name: Bump to next snapshot version
        if: inputs.version != ''
        run: |
          # Increment the patch segment and append -SNAPSHOT.
          # Example: 0.2.0 → 0.2.1-SNAPSHOT
          IFS='.' read -r major minor patch <<< "${{ inputs.version }}"
          NEXT_VERSION="${major}.${minor}.$((patch + 1))-SNAPSHOT"
          echo "Bumping to next development version: ${NEXT_VERSION}"
          mvn --batch-mode --no-transfer-progress versions:set -DnewVersion=${NEXT_VERSION} -DgenerateBackupPoms=false
          sed -i "s/^version=.*/version=${NEXT_VERSION}/" greener-spring-boot-gradle-plugin/gradle.properties
          sed -i "s/^coreVersion=.*/coreVersion=${NEXT_VERSION}/" greener-spring-boot-gradle-plugin/gradle.properties
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml greener-spring-boot-core/pom.xml greener-spring-boot-maven-plugin/pom.xml \
            greener-spring-boot-gradle-plugin/gradle.properties
          git commit -m "chore(release): bump version to ${NEXT_VERSION} [skip ci]"
          git pull --rebase
          git push

      # ── 7. Logs ─────────────────────────────────────────────────────────────
      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jreleaser-release
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties
