name: Energy Local Simulation (Baseline + Comparison)

# Simulates the local developer workflow: builds the plugins, runs a baseline
# measurement, then a second measurement to compare against it.  Both runs
# happen on the same machine so the delta shows measurement reproducibility.
#
# ── Power source ──────────────────────────────────────────────────────────────
# Auto-detects: RAPL (bare-metal) → Scaphandre VM file → CPU-time × TDP
# estimation.  See energy-baseline.yml for details.
#
# ── Trigger ───────────────────────────────────────────────────────────────────
# Manual dispatch only (workflow_dispatch).

on:
  workflow_dispatch:

env:
  # JDK 25 required by Spring Petclinic (Spring Boot 4.x); plugins target Java 17
  JAVA_VERSION: "25"
  PETCLINIC_VERSION: "main"
  JOULAR_CORE_VERSION: "0.0.1-alpha-11"
  MEASURE_SECONDS: "60"
  WARMUP_SECONDS: "30"
  THRESHOLD: "10"
  OHA_VERSION: "1.14.0"
  TDP_WATTS: "100"

jobs:
  energy-local-simulation:
    name: Baseline + Comparison Run
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      # ── 1. Setup ────────────────────────────────────────────────────────────
      - name: Checkout greener-spring-boot
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 2. Power source detection & Joular Core (fail fast) ──────────────────
      - name: Setup energy measurement
        id: energy-setup
        uses: ./.github/actions/setup-energy-measurement
        with:
          joular-core-version: ${{ env.JOULAR_CORE_VERSION }}
          tdp-watts: ${{ env.TDP_WATTS }}

      # ── 3. Build greener-spring-boot plugins ────────────────────────────────
      - name: Build greener-spring-boot plugins
        if: steps.energy-setup.outputs.power-source != 'none'
        run: mvn --batch-mode --no-transfer-progress clean install -DskipTests

      # ── 4. Install oha ──────────────────────────────────────────────────────
      - name: Install oha ${{ env.OHA_VERSION }}
        if: steps.energy-setup.outputs.power-source != 'none'
        run: |
          curl -fsSL -o /usr/local/bin/oha \
            "https://github.com/hatoo/oha/releases/download/v${{ env.OHA_VERSION }}/oha-linux-amd64"
          chmod +x /usr/local/bin/oha
          oha --version

      # ── 5. Clone & build Spring Petclinic ───────────────────────────────
      - name: Clone Spring Petclinic (${{ env.PETCLINIC_VERSION }})
        if: steps.energy-setup.outputs.power-source != 'none'
        run: |
          git clone --depth 1 --branch ${{ env.PETCLINIC_VERSION }} \
            https://github.com/spring-projects/spring-petclinic.git \
            /tmp/spring-petclinic

      - name: Build Spring Petclinic
        if: steps.energy-setup.outputs.power-source != 'none'
        working-directory: /tmp/spring-petclinic
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Copy workload scripts
        if: steps.energy-setup.outputs.power-source != 'none'
        run: cp -r "$GITHUB_WORKSPACE/examples" /tmp/spring-petclinic/

      # ── 6. Run 1: Baseline measurement ──────────────────────────────────
      - name: "Run 1 — Baseline measurement"
        if: steps.energy-setup.outputs.power-source != 'none'
        working-directory: /tmp/spring-petclinic
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "  RUN 1 — BASELINE"
          echo "════════════════════════════════════════════════════════════"

          # Remove any stale baseline so Run 1 reports "No baseline"
          rm -f /tmp/energy-baseline.json

          VM_FLAGS=""
          if [ "${{ steps.energy-setup.outputs.power-source }}" = "vm-file" ] || \
             [ "${{ steps.energy-setup.outputs.power-source }}" = "ci-estimated" ]; then
            VM_FLAGS="-Dgreener.vmMode=true -Dgreener.vmPowerFilePath=${VM_POWER_FILE}"
          fi

          mvn --batch-mode --no-transfer-progress \
            com.patbaumgartner:greener-spring-boot-maven-plugin:0.2.0-SNAPSHOT:measure \
            -Dgreener.joularCoreBinaryPath="${JOULAR_CORE_BINARY}" \
            -Dgreener.baseUrl="http://localhost:8080" \
            -Dgreener.externalTrainingScriptFile=/tmp/spring-petclinic/examples/workloads/oha/run.sh \
            -Dgreener.warmupDurationSeconds=${{ env.WARMUP_SECONDS }} \
            -Dgreener.measureDurationSeconds=${{ env.MEASURE_SECONDS }} \
            -Dgreener.requestsPerSecond=20 \
            -Dgreener.healthCheckPath=/actuator/health/readiness \
            -Dgreener.baselineFile=/tmp/energy-baseline.json \
            -Dgreener.failOnRegression=false \
            -Dgreener.reportOutputDir=/tmp/greener-reports-baseline \
            ${VM_FLAGS}
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Promote Run 1 to baseline
        if: steps.energy-setup.outputs.power-source != 'none'
        working-directory: /tmp/spring-petclinic
        run: |
          mvn --batch-mode --no-transfer-progress \
            com.patbaumgartner:greener-spring-boot-maven-plugin:0.2.0-SNAPSHOT:update-baseline \
            -Dgreener.baselineFile=/tmp/energy-baseline.json \
            -Dgreener.reportOutputDir=/tmp/greener-reports-baseline \
            -Dgreener.commitSha=${{ github.sha }} \
            -Dgreener.branch=${{ github.ref_name }}

          echo ""
          echo "Baseline created:"
          python3 -c "
          import json
          b = json.load(open('/tmp/energy-baseline.json'))
          e = b['report']['totalEnergyJoules']
          print(f'  Energy : {e:.2f} J')
          print(f'  Commit : ${{ github.sha }}')
          "

      # ── 7. Run 2: Comparison measurement ────────────────────────────────
      - name: "Run 2 — Comparison measurement (against baseline)"
        if: steps.energy-setup.outputs.power-source != 'none'
        working-directory: /tmp/spring-petclinic
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "  RUN 2 — COMPARISON (vs baseline from Run 1)"
          echo "════════════════════════════════════════════════════════════"

          VM_FLAGS=""
          if [ "${{ steps.energy-setup.outputs.power-source }}" = "vm-file" ] || \
             [ "${{ steps.energy-setup.outputs.power-source }}" = "ci-estimated" ]; then
            VM_FLAGS="-Dgreener.vmMode=true -Dgreener.vmPowerFilePath=${VM_POWER_FILE}"
          fi

          mvn --batch-mode --no-transfer-progress \
            com.patbaumgartner:greener-spring-boot-maven-plugin:0.2.0-SNAPSHOT:measure \
            -Dgreener.joularCoreBinaryPath="${JOULAR_CORE_BINARY}" \
            -Dgreener.baseUrl="http://localhost:8080" \
            -Dgreener.externalTrainingScriptFile=/tmp/spring-petclinic/examples/workloads/oha/run.sh \
            -Dgreener.warmupDurationSeconds=${{ env.WARMUP_SECONDS }} \
            -Dgreener.measureDurationSeconds=${{ env.MEASURE_SECONDS }} \
            -Dgreener.requestsPerSecond=20 \
            -Dgreener.healthCheckPath=/actuator/health/readiness \
            -Dgreener.baselineFile=/tmp/energy-baseline.json \
            -Dgreener.threshold=${{ env.THRESHOLD }} \
            -Dgreener.failOnRegression=false \
            -Dgreener.reportOutputDir=/tmp/greener-reports-comparison \
            ${VM_FLAGS}
        env:
          GITHUB_SHA: ${{ github.sha }}

      # ── 8. Summary ─────────────────────────────────────────────────────────
      - name: Print comparison summary
        if: steps.energy-setup.outputs.power-source != 'none'
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "  RESULTS — Baseline vs Comparison"
          echo "════════════════════════════════════════════════════════════"

          python3 - <<'PYEOF'
          import json, os

          baseline = json.load(open("/tmp/energy-baseline.json"))
          b_energy = baseline["report"]["totalEnergyJoules"]

          # Read comparison report (latest-energy-report.json from run 2)
          comparison = json.load(open("/tmp/greener-reports-comparison/oha/latest-energy-report.json"))
          c_energy = comparison["report"]["totalEnergyJoules"]

          delta = c_energy - b_energy
          pct = (delta / b_energy * 100) if b_energy > 0 else 0

          print(f"  Baseline energy  : {b_energy:.2f} J")
          print(f"  Comparison energy: {c_energy:.2f} J")
          print(f"  Delta            : {delta:+.2f} J ({pct:+.2f} %)")
          print(f"  Threshold        : +/-{os.environ.get('THRESHOLD', '10')} %")
          print()

          if abs(pct) <= float(os.environ.get("THRESHOLD", "10")):
              print("  [OK] Within threshold - results are reproducible.")
          else:
              print("  [!!] Outside threshold - noisy runner or real regression.")
          PYEOF

      # ── 9. Cleanup ─────────────────────────────────────────────────────
      - name: Stop CI power estimator
        if: always() && steps.energy-setup.outputs.power-source == 'ci-estimated'
        run: kill "${CI_ESTIMATOR_PID}" 2>/dev/null || true

      # ── 10. Artifacts ───────────────────────────────────────────────────
      - name: Upload baseline report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: greener-reports-baseline-${{ github.sha }}
          path: /tmp/greener-reports-baseline/
          retention-days: 30

      - name: Upload comparison report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: greener-reports-comparison-${{ github.sha }}
          path: /tmp/greener-reports-comparison/
          retention-days: 30

      - name: Upload baseline JSON
        if: steps.energy-setup.outputs.power-source != 'none'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: energy-baseline-${{ github.sha }}
          path: /tmp/energy-baseline.json
          retention-days: 30
