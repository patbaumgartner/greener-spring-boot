name: CodeQL

# Standard CodeQL analysis for Java source code using the security-and-quality
# query suite (OWASP Top 10 / CWE coverage).
#
# ── Trigger ───────────────────────────────────────────────────────────────────
# Runs on every push/PR to main and weekly (Sunday 02:00 UTC) to catch new CVEs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"   # Sunday 02:00 UTC

env:
  JAVA_VERSION: "17"

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    permissions:
      actions: read
      contents: read
      security-events: write   # required to upload SARIF results

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── 2. Java ─────────────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 3. Initialize CodeQL ────────────────────────────────────────────────
      # The "java-kotlin" language covers all Java source in the Maven modules.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: java-kotlin
          # "security-and-quality" is the standard suite — equivalent to running
          # CodeQL with all security queries plus quality checks.
          queries: security-and-quality

      # ── 4. Build Maven modules ──────────────────────────────────────────────
      # The Gradle plugin depends on the Maven modules; build them here and let
      # CodeQL pick up the compiled bytecode automatically.
      - name: Build Maven modules
        run: mvn --batch-mode --no-transfer-progress clean compile -DskipTests

      # ── 5. Build Gradle plugin ──────────────────────────────────────────────
      - name: Build Gradle plugin
        working-directory: greener-spring-boot-gradle-plugin
        run: |
          cd ..
          mvn --batch-mode --no-transfer-progress install -DskipTests
          cd greener-spring-boot-gradle-plugin
          ./gradlew classes --no-daemon

      # ── 6. Perform CodeQL analysis ──────────────────────────────────────────
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: "/language:java-kotlin"
