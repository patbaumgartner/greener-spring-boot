name: Energy Baseline (Spring Petclinic)

# Creates or refreshes the energy baseline for Spring Petclinic.
#
# ── Power source ──────────────────────────────────────────────────────────────
# Auto-detects: RAPL (bare-metal) → Scaphandre VM file → CPU-time × TDP
# estimation.  On GitHub-hosted runners the estimation mode is used.
# See examples/vm-setup/README.md for details.
#
# ── Trigger ───────────────────────────────────────────────────────────────────
# Runs after CI succeeds on main, or manually via workflow_dispatch.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  # JDK 25 required by Spring Petclinic (Spring Boot 4.x); plugins target Java 17
  JAVA_VERSION: "25"
  # Keep GREENER_VERSION in sync with the root pom.xml <version> field.
  GREENER_VERSION: "0.2.1-SNAPSHOT"
  PETCLINIC_VERSION: "main"
  JOULAR_CORE_VERSION: "0.0.1-beta-4"
  MEASURE_SECONDS: "60"
  WARMUP_SECONDS: "30"
  OHA_VERSION: "1.14.0"
  # CPU TDP used for software estimation when RAPL is unavailable.
  # GitHub-hosted ubuntu-latest uses Intel Xeon Platinum 8370C (270 W, 32 cores).
  # A 2–4 vCPU slice shares roughly 100 W of that budget.
  TDP_WATTS: "100"

jobs:
  energy-baseline:
    name: Measure & Store Energy Baseline
    # Skip if triggered by a failed CI run (workflow_dispatch always runs)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      actions: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── 2. Java & Maven cache ───────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 3. Build greener-spring-boot plugins ────────────────────────────────
      - name: Build greener-spring-boot plugins
        run: mvn --batch-mode --no-transfer-progress clean install -DskipTests

      # ── 4. Clone Spring Petclinic ───────────────────────────────────────────
      - name: Clone Spring Petclinic (${{ env.PETCLINIC_VERSION }})
        run: |
          git clone --depth 1 --branch ${{ env.PETCLINIC_VERSION }} \
            https://github.com/spring-projects/spring-petclinic.git \
            /tmp/spring-petclinic

      # ── 5. Build Spring Petclinic ───────────────────────────────────────────
      - name: Build Spring Petclinic
        working-directory: /tmp/spring-petclinic
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      # ── 6. Install oha (load-test tool) ─────────────────────────────────────
      - name: Install oha ${{ env.OHA_VERSION }}
        run: |
          curl -fsSL -o /usr/local/bin/oha \
            "https://github.com/hatoo/oha/releases/download/v${{ env.OHA_VERSION }}/oha-linux-amd64"
          chmod +x /usr/local/bin/oha
          oha --version

      # ── 7. Detect power source & build Joular Core ──────────────────────────
      - name: Setup energy measurement
        id: energy-setup
        uses: ./.github/actions/setup-energy-measurement
        with:
          joular-core-version: ${{ env.JOULAR_CORE_VERSION }}
          tdp-watts: ${{ env.TDP_WATTS }}

      # ── 8. Measure energy ──────────────────────────────────────────────────
      - name: Measure energy consumption
        if: steps.energy-setup.outputs.power-source != 'none'
        working-directory: /tmp/spring-petclinic
        run: |
          cp -r "$GITHUB_WORKSPACE/examples" /tmp/spring-petclinic/

          APP_PORT=$(python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()")

          VM_FLAGS=""
          if [ "${{ steps.energy-setup.outputs.power-source }}" = "vm-file" ] || \
             [ "${{ steps.energy-setup.outputs.power-source }}" = "ci-estimated" ]; then
            VM_FLAGS="-Dgreener.vmMode=true -Dgreener.vmPowerFilePath=${VM_POWER_FILE}"
          fi

          mvn --batch-mode --no-transfer-progress \
            com.patbaumgartner:greener-spring-boot-maven-plugin:${{ env.GREENER_VERSION }}:measure \
            -Dgreener.joularCoreBinaryPath="${JOULAR_CORE_BINARY}" \
            -Dgreener.baseUrl="http://localhost:${APP_PORT}" \
            -Dgreener.externalTrainingScriptFile=/tmp/spring-petclinic/examples/workloads/oha/run.sh \
            -Dgreener.warmupDurationSeconds=${{ env.WARMUP_SECONDS }} \
            -Dgreener.measureDurationSeconds=${{ env.MEASURE_SECONDS }} \
            -Dgreener.requestsPerSecond=20 \
            -Dgreener.healthCheckPath=/actuator/health/readiness \
            -Dgreener.baselineFile=/tmp/energy-baseline.json \
            -Dgreener.failOnRegression=false \
            -Dgreener.reportOutputDir=/tmp/greener-reports \
            ${VM_FLAGS}
        env:
          GITHUB_SHA: ${{ github.sha }}

      # ── 9. Stop CPU power estimator ─────────────────────────────────────────
      - name: Stop CI power estimator
        if: always() && steps.energy-setup.outputs.power-source == 'ci-estimated'
        run: kill "${CI_ESTIMATOR_PID}" 2>/dev/null || true

      # ── 10. Promote measurement to baseline ─────────────────────────────────
      - name: Update baseline
        if: steps.energy-setup.outputs.power-source != 'none'
        working-directory: /tmp/spring-petclinic
        run: |
          mvn --batch-mode --no-transfer-progress \
            com.patbaumgartner:greener-spring-boot-maven-plugin:${{ env.GREENER_VERSION }}:update-baseline \
            -Dgreener.baselineFile=/tmp/energy-baseline.json \
            -Dgreener.reportOutputDir=/tmp/greener-reports \
            -Dgreener.commitSha=${{ github.sha }} \
            -Dgreener.branch=${{ github.ref_name }}

      # ── 11. Upload artifacts ────────────────────────────────────────────────
      - name: Upload baseline as artifact
        if: steps.energy-setup.outputs.power-source != 'none'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: energy-baseline-${{ github.sha }}
          path: |
            /tmp/energy-baseline.json
            /tmp/energy-baseline-trend.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload energy reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: greener-reports-baseline-${{ github.sha }}
          path: /tmp/greener-reports/
          retention-days: 30
          if-no-files-found: ignore

      # ── 12. Cache baseline for PR comparisons ───────────────────────────────
      - name: Delete previous baseline cache
        if: steps.energy-setup.outputs.power-source != 'none'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh cache delete "energy-baseline-${{ github.ref_name }}-latest" 2>/dev/null || true

      - name: Cache energy baseline
        if: steps.energy-setup.outputs.power-source != 'none'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            /tmp/energy-baseline.json
            /tmp/energy-baseline-trend.json
          key: energy-baseline-${{ github.ref_name }}-latest
