name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  JAVA_VERSION: "25"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build and test Maven modules
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maven-test-results
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*.txt

      - name: Set up Gradle cache
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Build Gradle plugin
        working-directory: greener-spring-boot-gradle-plugin
        run: |
          # Install Maven artifacts to local repository first so Gradle can resolve them
          cd ..
          mvn --batch-mode --no-transfer-progress install -DskipTests
          cd greener-spring-boot-gradle-plugin
          ./gradlew build --no-daemon

      - name: Upload Gradle plugin test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-test-results
          path: greener-spring-boot-gradle-plugin/build/reports/tests/
