name: CI

# Builds and tests all modules (core, Maven plugin, Gradle plugin) and runs
# static analysis gates (SpotBugs, PMD, OpenRewrite dry-run).
#
# ── Trigger ───────────────────────────────────────────────────────────────────
# Runs on every push (all branches) and every pull request.

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── 2. Java & Maven cache ───────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 3. Build & test Maven modules ───────────────────────────────────────
      - name: Build and test Maven modules
        run: mvn --batch-mode --no-transfer-progress clean install

      # ── 4. Static analysis ──────────────────────────────────────────────────
      # Note: spring-javaformat:validate is already bound to the validate phase
      # and runs as part of `mvn verify` above — no separate step needed.

      - name: Run SpotBugs
        run: mvn --batch-mode --no-transfer-progress spotbugs:check -pl greener-spring-boot-core,greener-spring-boot-maven-plugin

      - name: Run PMD
        run: mvn --batch-mode --no-transfer-progress pmd:check -pl greener-spring-boot-core,greener-spring-boot-maven-plugin

      - name: OpenRewrite dry-run
        run: mvn --batch-mode --no-transfer-progress rewrite:dryRun

      # ── 5. Publish Maven test results ───────────────────────────────────────
      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maven-test-results
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*.txt

      # ── 6. Build Gradle plugin ──────────────────────────────────────────────
      - name: Set up Gradle cache
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Build Gradle plugin
        working-directory: greener-spring-boot-gradle-plugin
        run: ./gradlew build --no-daemon

      # ── 7. Publish Gradle test results ──────────────────────────────────────
      - name: Upload Gradle plugin test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-test-results
          path: greener-spring-boot-gradle-plugin/build/reports/tests/
          if-no-files-found: ignore
