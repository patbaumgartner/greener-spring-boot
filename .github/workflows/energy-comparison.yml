name: Energy Comparison (Spring Petclinic)

# Measures energy consumption on a PR, compares against the main-branch
# baseline, and posts the result as a PR comment.
#
# ── Power source ──────────────────────────────────────────────────────────────
# Auto-detects: RAPL (bare-metal) → Scaphandre VM file → CPU-time × TDP
# estimation.  See energy-baseline.yml for details.
#
# ── Trigger ───────────────────────────────────────────────────────────────────
# Runs on every pull request.

on:
  pull_request:

env:
  # JDK 25 required by Spring Petclinic (Spring Boot 4.x); plugins target Java 17
  JAVA_VERSION: "25"
  PETCLINIC_VERSION: "main"
  JOULAR_CORE_VERSION: "0.0.1-alpha-11"
  MEASURE_SECONDS: "60"
  WARMUP_SECONDS: "30"
  THRESHOLD: "10"
  OHA_VERSION: "1.14.0"
  TDP_WATTS: "100"

jobs:
  energy-comparison:
    name: Measure & Compare Energy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      pull-requests: write
      contents: read

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout greener-spring-boot
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── 2. Java ─────────────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── 3. Build plugins ────────────────────────────────────────────────────
      - name: Build greener-spring-boot plugins
        run: mvn --batch-mode --no-transfer-progress clean install -DskipTests

      # ── 4. Restore baseline from cache ──────────────────────────────────────
      - name: Restore energy baseline (main branch)
        id: cache-baseline
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/energy-baseline.json
          key: energy-baseline-main-latest
          restore-keys: |
            energy-baseline-main-

      - name: Check baseline availability
        run: |
          if [ -f /tmp/energy-baseline.json ]; then
            echo "BASELINE_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "Baseline found:"
            python3 -m json.tool /tmp/energy-baseline.json | head -20
          else
            echo "BASELINE_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "No baseline found — comparison will run without a reference."
          fi

      # ── 5. Clone & build Spring Petclinic ───────────────────────────────────
      - name: Clone Spring Petclinic (${{ env.PETCLINIC_VERSION }})
        run: |
          git clone --depth 1 --branch ${{ env.PETCLINIC_VERSION }} \
            https://github.com/spring-projects/spring-petclinic.git \
            /tmp/spring-petclinic

      - name: Build Spring Petclinic
        working-directory: /tmp/spring-petclinic
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      # ── 6. Install oha ──────────────────────────────────────────────────────
      - name: Install oha ${{ env.OHA_VERSION }}
        run: |
          curl -fsSL -o /usr/local/bin/oha \
            "https://github.com/hatoo/oha/releases/download/v${{ env.OHA_VERSION }}/oha-linux-amd64"
          chmod +x /usr/local/bin/oha
          oha --version

      # ── 7. Detect power source & build Joular Core ──────────────────────────
      - name: Setup energy measurement
        id: energy-setup
        uses: ./.github/actions/setup-energy-measurement
        with:
          joular-core-version: ${{ env.JOULAR_CORE_VERSION }}
          tdp-watts: ${{ env.TDP_WATTS }}

      # ── 8. Measure energy ──────────────────────────────────────────────────
      - name: Measure energy consumption
        if: steps.energy-setup.outputs.power-source != 'none'
        working-directory: /tmp/spring-petclinic
        run: |
          cp -r "$GITHUB_WORKSPACE/examples" /tmp/spring-petclinic/

          VM_FLAGS=""
          if [ "${{ steps.energy-setup.outputs.power-source }}" = "vm-file" ] || \
             [ "${{ steps.energy-setup.outputs.power-source }}" = "ci-estimated" ]; then
            VM_FLAGS="-Dgreener.vmMode=true -Dgreener.vmPowerFilePath=${VM_POWER_FILE}"
          fi

          mvn --batch-mode --no-transfer-progress \
            com.patbaumgartner:greener-spring-boot-maven-plugin:0.2.0-SNAPSHOT:measure \
            -Dgreener.joularCoreBinaryPath="${JOULAR_CORE_BINARY}" \
            -Dgreener.baseUrl="http://localhost:8080" \
            -Dgreener.externalTrainingScriptFile=/tmp/spring-petclinic/examples/workloads/oha/run.sh \
            -Dgreener.warmupDurationSeconds=${{ env.WARMUP_SECONDS }} \
            -Dgreener.measureDurationSeconds=${{ env.MEASURE_SECONDS }} \
            -Dgreener.requestsPerSecond=20 \
            -Dgreener.healthCheckPath=/actuator/health/readiness \
            -Dgreener.baselineFile=/tmp/energy-baseline.json \
            -Dgreener.threshold=${{ env.THRESHOLD }} \
            -Dgreener.failOnRegression=false \
            -Dgreener.reportOutputDir=/tmp/greener-reports \
            ${VM_FLAGS}
        env:
          GITHUB_SHA: ${{ github.sha }}

      # ── 9. Stop CPU power estimator ─────────────────────────────────────────
      - name: Stop CI power estimator
        if: always() && steps.energy-setup.outputs.power-source == 'ci-estimated'
        run: kill "${CI_ESTIMATOR_PID}" 2>/dev/null || true

      # ── 10. Parse results for PR comment ────────────────────────────────────
      - name: Parse energy report
        if: always()
        run: |
          # Read baseline energy from cached baseline JSON
          BASELINE_JSON=/tmp/energy-baseline.json
          BASELINE_ENERGY=""
          if [ -f "${BASELINE_JSON}" ]; then
            BASELINE_ENERGY=$(python3 -c "
          import json
          data = json.load(open('${BASELINE_JSON}'))
          print(f\"{data['report']['totalEnergyJoules']:.2f}\")
          " 2>/dev/null || echo "")
          fi

          # Read current energy from the plugin's report JSON
          REPORT_JSON=$(find /tmp/greener-reports -name latest-energy-report.json -type f 2>/dev/null | head -1)
          CURRENT_ENERGY=""
          if [ -f "${REPORT_JSON}" ]; then
            CURRENT_ENERGY=$(python3 -c "
          import json
          data = json.load(open('${REPORT_JSON}'))
          print(f\"{data['report']['totalEnergyJoules']:.2f}\")
          " 2>/dev/null || echo "")
          fi

          # Compute delta when both values are available
          DELTA=""
          DELTA_PERCENT=""
          VERDICT=""
          if [ -n "${BASELINE_ENERGY}" ] && [ -n "${CURRENT_ENERGY}" ]; then
            read -r DELTA DELTA_PERCENT VERDICT <<< $(python3 -c "
          b, c, t = ${BASELINE_ENERGY}, ${CURRENT_ENERGY}, ${{ env.THRESHOLD }}
          delta = c - b
          pct = (delta / b * 100) if b != 0 else 0
          verdict = '✅ Within threshold' if abs(pct) <= t else '⚠️ Exceeds threshold'
          print(f'{delta:+.2f} {pct:+.2f} {verdict}')
          " 2>/dev/null || echo "")
          fi

          REPORT=$(find /tmp/greener-reports -name greener-energy-report.html -type f 2>/dev/null | head -1)
          [ -f "${REPORT}" ] && echo "REPORT_EXISTS=true"  >> "$GITHUB_ENV" \
                             || echo "REPORT_EXISTS=false" >> "$GITHUB_ENV"

          echo "BASELINE_ENERGY=${BASELINE_ENERGY}"     >> "$GITHUB_ENV"
          echo "CURRENT_ENERGY=${CURRENT_ENERGY}"       >> "$GITHUB_ENV"
          echo "DELTA=${DELTA}"                         >> "$GITHUB_ENV"
          echo "DELTA_PERCENT=${DELTA_PERCENT}"         >> "$GITHUB_ENV"
          echo "VERDICT=${VERDICT}"                     >> "$GITHUB_ENV"
          echo "POWER_SOURCE=${{ steps.energy-setup.outputs.power-source }}" >> "$GITHUB_ENV"

      # ── 11. Post PR comment ─────────────────────────────────────────────────
      - name: Post energy report as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const baseline     = process.env.BASELINE_ENERGY  || '';
            const current      = process.env.CURRENT_ENERGY   || '';
            const delta        = process.env.DELTA            || '';
            const deltaPct     = process.env.DELTA_PERCENT    || '';
            const verdict      = process.env.VERDICT          || '';
            const reportExists = process.env.REPORT_EXISTS    === 'true';
            const powerSource  = process.env.POWER_SOURCE     || 'none';
            const sha          = '${{ github.sha }}'.substring(0, 8);

            const isEstimated  = powerSource === 'ci-estimated';
            const isSkipped    = powerSource === 'none';

            let sourceNote = '';
            if (isEstimated) {
              sourceNote = '\n> ℹ️ **Software-estimated energy** — this runner has no direct RAPL ' +
                'access.  Power was estimated from CPU utilisation × TDP using ' +
                '[`ci-cpu-energy-estimator.sh`](./examples/vm-setup/ci-cpu-energy-estimator.sh).\n' +
                '> Values are reproducible on the same runner type and valid for relative ' +
                'comparisons between commits, but do not reflect absolute hardware power.\n' +
                '> For hardware-accurate measurements use a self-hosted bare-metal runner or ' +
                'a KVM host with [Scaphandre](./examples/vm-setup/README.md).';
            } else if (isSkipped) {
              sourceNote = '\n> ⚠️ **Energy measurement skipped** — no power source detected.';
            }

            // Format energy values
            const baselineStr = baseline ? `${baseline} J` : '— _no baseline yet_';
            const currentStr  = isSkipped ? '— skipped' : (current ? `${current} J` : '— _no data_');
            const deltaStr    = delta ? `${delta} J (${deltaPct}%)` : '—';
            const verdictStr  = verdict || (baseline ? '—' : '_Run energy-baseline first_');

            const body = [
              '## ⚡ Energy Consumption Report — greener-spring-boot',
              '',
              '| Metric | Value |',
              '|---|---|',
              `| **Baseline (main)** | ${baselineStr} |`,
              `| **Current (PR)** | ${currentStr} |`,
              `| **Delta** | ${deltaStr} |`,
              `| **Verdict** | ${verdictStr} |`,
              `| **Threshold** | ±${{ env.THRESHOLD }}% |`,
              `| **Power source** | \`${powerSource}\` |`,
              `| **Workload** | oha (constant-rate HTTP load) |`,
              `| **Commit** | \`${sha}\` |`,
              '',
              sourceNote,
              '',
              reportExists && !isSkipped
                ? '📊 Full HTML report: ' +
                  `[workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
                : '',
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('greener-spring-boot'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── 12. Upload artifacts ────────────────────────────────────────────────
      - name: Upload energy reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: greener-reports-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: /tmp/greener-reports/
          retention-days: 14
          if-no-files-found: ignore
