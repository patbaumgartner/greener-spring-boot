version: 2
updates:
- package-ecosystem: maven
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "06:00"
    timezone: Europe/Zurich
  open-pull-requests-limit: 10
  groups:
    jackson:
      patterns:
      - tools.jackson*
    junit:
      patterns:
      - org.junit*
    mockito:
      patterns:
      - org.mockito*
    maven-plugin-tooling:
      patterns:
      - org.apache.maven*
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
  labels:
  - dependencies
  - maven
- package-ecosystem: gradle
  directory: /greener-spring-boot-gradle-plugin
  schedule:
    interval: weekly
    day: monday
    time: "06:00"
    timezone: Europe/Zurich
  open-pull-requests-limit: 10
  groups:
    jackson:
      patterns:
      - tools.jackson*
    junit:
      patterns:
      - org.junit*
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
  labels:
  - dependencies
  - gradle
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "06:00"
    timezone: Europe/Zurich
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: ci(deps)
    include: scope
